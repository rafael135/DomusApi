name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Unit Tests & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Domus.slnx

      - name: Build
        run: dotnet build Domus.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test tests/Domus.Core.Tests
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage/unit

      - name: Run integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: >
          dotnet test tests/Domus.Integration.Tests
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory coverage/integration

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
